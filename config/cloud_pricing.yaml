# Tier mapping for job sizing
tiers:
  small:
    description: "Small datasets, simple models (<1M parameters)"
    min_vcpu: 4
    min_memory_gb: 14
    gpu_required: false
    estimated_hours: 0.5
  medium:
    description: "Medium datasets, moderate models (1M-100M parameters)"
    min_vcpu: 8
    min_memory_gb: 30
    gpu_required: false
    estimated_hours: 2.0
  large:
    description: "Large datasets, deep learning (100M+ parameters)"
    min_vcpu: 8
    min_memory_gb: 60
    gpu_required: true
    estimated_hours: 8.0
  gpu_intensive:
    description: "GPU-heavy training (LLMs, vision transformers)"
    min_vcpu: 8
    min_memory_gb: 60
    gpu_required: true
    estimated_hours: 24.0
